name: CI Docker

env:
  API_BACKEND_URL: ${{ vars.API_BACKEND_URL }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-check:
    name: Vérification build Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image back (test)
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: false
          tags: local/colocaton-back:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image front (test)
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          push: false
          tags: local/colocaton-front:ci
          build-args: |
            API_BACKEND_URL=${{ env.API_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish-main:
    name: Build & Push GHCR (main)
    if: github.ref == 'refs/heads/main'
    needs: docker-build-check
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: vars
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/colocaton-back:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/colocaton-back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/colocaton-front:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/colocaton-front:${{ github.sha }}
          build-args: |
            API_BACKEND_URL=${{ env.API_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
